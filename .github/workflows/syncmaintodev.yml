name: Sync main → dev

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev
      - run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git fetch origin main
          git merge origin/main
          git push
